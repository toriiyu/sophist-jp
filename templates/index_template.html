  <!-- Canonical URL -->

    "@context": "https://schema.org",

<body>
  <header>
    <nav>
      <a href="/" class="logo">
        <span class="logo-main">Sophist</span>

        </div>
        <button class="dark-toggle" aria-label="Dark mode toggle">🌙</button>
      </div>
    </nav>

  <main>
    <section class="hero" style="text-align: center; margin-bottom: 4rem; padding: 2rem 0;">
      <h1 style="font-size: 2.5em; margin-bottom: 1rem;">哲学への道を始めよう</h1>
      <p style="font-size: 1.1em; color: var(--secondary-text); max-width: 600px; margin: 0 auto;">

      </p>
    </section>

    <div class="category-filter">
      <button data-category="all" class="active">すべて</button>
      {{category_buttons}}
    </div>

    <section class="articles-grid">
      {{articles}}
    </section>
  </main>
